<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard - Secure Academic Chain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Student Dashboard</h1>
            <p>Verified Decentralized Credentials</p>
        </header>

        <main class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 1.4rem;">Welcome, <span id="sName" style="color: #38bdf8;"></span></h2>
                <span style="padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3);">CONNECTED</span>
            </div>
            
            <div style="background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 14px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <p style="font-size: 0.9rem; color: #94a3b8;">Register Number: <br><strong style="color: #fff; font-size: 1.05rem;" id="sReg"></strong></p>
                    <p style="font-size: 0.9rem; color: #94a3b8;">Course: <br><strong style="color: #fff; font-size: 1.05rem;" id="sCourse"></strong></p>
                </div>
                <div style="margin-bottom: 15px;">
                    <p style="font-size: 0.9rem; color: #94a3b8;">Certificate ID: <br><strong style="color: #38bdf8; font-size: 1.05rem;" id="sCertId"></strong></p>
                </div>
                <div style="margin-bottom: 15px;">
                    <p style="font-size: 0.9rem; color: #94a3b8;">Issue Date: <br><strong style="color: #fff;" id="sDate"></strong></p>
                </div>
                <div>
                    <p style="font-size: 0.9rem; color: #94a3b8;">Immutable Blockchain Hash:</p>
                    <p style="font-size: 0.85rem; word-break: break-all; color: #818cf8; background: rgba(15, 23, 42, 0.8); padding: 10px; border-radius: 8px; margin-top: 6px;" id="sHash"></p>
                </div>
            </div>

            <div style="margin-top: 25px; display: flex; gap: 15px;">
                <a id="downloadBtn" href="#" target="_blank" style="flex: 1; text-align: center; padding: 14px; background: #10b981; color: white; border-radius: 10px; text-decoration: none; font-weight: 600; display:none; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);">📥 Download Certificate PDF</a>
                <a href="index.html" style="padding: 14px 24px; background: #334155; color: white; border-radius: 10px; text-decoration: none; font-weight: 600; text-align: center;">Logout</a>
            </div>
        </main>
    </div>
    <script>
        const student = JSON.parse(localStorage.getItem('studentData'));
        if (!student) {
            window.location.href = 'student-login.html';
        } else {
            document.getElementById('sName').innerText = student.name;
            document.getElementById('sReg').innerText = student.regNo;
            document.getElementById('sCourse').innerText = student.course;
            document.getElementById('sCertId').innerText = student.certificateId || 'Pending University Issue';
            document.getElementById('sDate').innerText = student.issueDate || 'N/A';
            document.getElementById('sHash').innerText = student.hashCode || 'Waiting for block confirmation...';

            if (student.pdfPath) {
                const btn = document.getElementById('downloadBtn');
                btn.href = student.pdfPath;
                btn.style.display = 'block';
            }
        }
    </script>
</body>
</html>
