<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verifier Portal - Secure Academic Chain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Verifier Portal</h1>
            <p>Instant Public Certificate Verification</p>
        </header>

        <main class="card">
            <h2 style="margin-bottom: 20px; font-size: 1.3rem;">Verify Student Credential</h2>
            
            <form onsubmit="verifyCertificate(event)">
                <div style="margin-bottom: 20px;">
                    <label>Register Number</label>
                    <input type="text" id="verifyRegNo" placeholder="Enter student register number" required>
                </div>
                <button type="submit" style="width: 100%;">Search</button>
            </form>

            <div id="resultBox" class="hidden" style="margin-top: 25px; text-align: left;"></div>

            <div style="margin-top: 25px; text-align: center;">
                <a href="index.html">← Back to Home</a>
            </div>
        </main>
    </div>

    <script>
        async function verifyCertificate(e) {
            e.preventDefault();
            const regNo = document.getElementById('verifyRegNo').value.trim();
            const resultBox = document.getElementById('resultBox');

            if (!regNo) return;

            resultBox.classList.remove('hidden');
            resultBox.innerHTML = `<p style="color: #38bdf8; text-align: center;">Querying Blockchain Ledger...</p>`;

            const res = await fetch(`/api/verify/${regNo}`);
            const result = await res.json();

            if (result.success) {
                const data = result.data;
                resultBox.innerHTML = `
                    <div style="background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.3); padding: 20px; border-radius: 12px;">
                        <h3 style="color: #34d399; margin-bottom: 12px; font-size: 1.1rem;">✔ Certificate Found & Verified</h3>
                        <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 6px;">Student Name: <strong style="color: #fff;">${data.name}</strong></p>
                        <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 6px;">Course: <strong style="color: #fff;">${data.course}</strong></p>
                        <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 15px;">Certificate ID: <strong style="color: #38bdf8;">${data.certificateId}</strong></p>
                        
                        <button type="button" onclick="checkBlockchain('${data.hashCode}', ${data.isValidOnChain})" style="background: #6366f1; width:100%; padding: 12px; font-size: 0.95rem;">Check Blockchain Status</button>
                        <div id="blockchainResult" style="margin-top: 15px;"></div>
                    </div>
                `;
            } else {
                resultBox.innerHTML = `
                    <div style="background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.3); padding: 16px; border-radius: 12px; color: #f87171; text-align: center;">
                        ❌ ${result.message}
                    </div>
                `;
            }
        }

        function checkBlockchain(hashCode, isValid) {
            const bcDiv = document.getElementById('blockchainResult');
            if (isValid) {
                bcDiv.innerHTML = `
                    <div style="padding: 15px; background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; border-radius: 10px;">
                        <p style="color: #34d399; font-weight: bold; font-size: 1rem;">✔ Blockchain Status: VALID</p>
                        <p style="font-size: 0.8rem; word-break: break-all; color: #cbd5e1; margin-top: 6px;"><strong>Hash:</strong> ${hashCode}</p>
                    </div>
                `;
            } else {
                bcDiv.innerHTML = `
                    <div style="padding: 15px; background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; border-radius: 10px;">
                        <p style="color: #f87171; font-weight: bold; font-size: 1rem;">✖ Blockchain Status: INVALID / REVOKED</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
